# Unified traffic sign label taxonomy.
#
# Every dataset adapter maps its native class IDs onto this list via
# configs/datasets/<dataset>.yaml. Two label sets are derived from it:
#
#   - classifier labels: `id` / `name` (one per entry below)
#   - detector labels:   `category` (the small, fixed set of coarse
#     GTSDB-style super-classes: prohibitory | mandatory | danger | other)
#
# Seeded 1:1 from the 43 official GTSRB/GTSDB classes (both benchmarks share
# the same class IDs and definitions, so gtsrb_id doubles as the GTSDB id).
# Polish-only signs will be appended here later with gtsrb_id: null.

classes:
  - id: 0
    name: speed_limit_20
    category: prohibitory
    gtsrb_id: 0
    en: "Speed limit (20 km/h)"
    de: "Zulässige Höchstgeschwindigkeit (20 km/h)"
    pl: "Ograniczenie prędkości do 20 km/h"

